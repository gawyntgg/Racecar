<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAWYNT APEX — V6.1 STABLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #0051ff;
            --neon: #00f2ff;
            --accent: #ff007f;
            --boost: #ff3300;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* --- LOBBY SYSTEM --- */
        #lobby {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #1e1b4b 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%; max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo-main {
            font-family: 'Orbitron'; font-size: 3rem;
            font-weight: 900; color: var(--neon);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .section-label {
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 700;
            color: #888; text-transform: uppercase; margin: 25px 0 10px;
            letter-spacing: 2px;
        }

        /* FIXED SELECTION GRID */
        .selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card {
            background: rgba(255,255,255,0.05); border: 2px solid transparent; border-radius: 15px;
            padding: 15px 5px; cursor: pointer; transition: 0.2s;
        }
        .card.selected {
            border-color: var(--neon); background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 15px var(--neon);
        }

        .dot-row { display: flex; justify-content: center; gap: 12px; }
        .dot {
            width: 45px; height: 45px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: 0.2s;
        }
        .dot.active { 
            border-color: #fff; 
            box-shadow: 0 0 15px currentColor; 
            transform: scale(1.2);
        }

        /* NETWORK AREA */
        .network-zone { margin-top: 30px; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
            font-family: 'Orbitron'; text-align: center; font-size: 1.1rem; margin-bottom: 10px;
            background: rgba(0,0,0,0.4); color: white;
        }
        input:focus { outline: none; border-color: var(--neon); }

        .btn {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-host { background: var(--primary); color: white; margin-bottom: 8px; }
        .btn-join { background: white; color: black; }

        /* --- GAME UI --- */
        #game-ui { display: none; }
        #canvas { position: fixed; inset: 0; background: #000; }
        #hud {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-around; z-index: 500;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border-radius: 15px;
            border-bottom: 3px solid var(--neon); text-align: center;
        }

        #mobile-controls {
            position: fixed; bottom: 30px; width: 100%;
            display: none; justify-content: space-between; padding: 0 20px; z-index: 500;
        }
        .joy-circ {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); 
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="container">
            <h1 class="logo-main">GAWYNT</h1>
            
            <div class="section-label">Vehicle Rig</div>
            <div class="selection-grid" id="car-selector"></div>

            <div class="section-label">Team Color</div>
            <div class="dot-row" id="color-selector"></div>

            <div class="network-zone">
                <button class="btn btn-host" id="host-btn">CREATE SECTOR</button>
                <div class="section-label">Or Join Existing</div>
                <input type="text" id="sector-code" placeholder="ENTER CODE">
                <button class="btn btn-join" id="join-btn">CONNECT UPLINK</button>
                <p id="status" style="margin-top:15px; font-size: 0.9rem; color: var(--neon); font-family: 'Orbitron';"></p>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div id="hud">
            <div class="stat-card">SPEED<br><span id="ui-speed" style="font-size:1.5rem; font-weight:900;">0</span></div>
            <div class="stat-card" style="border-color: var(--boost);">NOS<br><span id="ui-boost" style="font-size:1.5rem; font-weight:900;">100</span></div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="mobile-controls">
            <div style="display:flex; gap:10px;">
                <div id="joy-L" class="joy-circ">L</div>
                <div id="joy-R" class="joy-circ">R</div>
            </div>
            <div style="display:flex; gap:10px;">
                <div id="btn-boost" class="joy-circ" style="border-color:var(--boost)">NOS</div>
                <div id="btn-gas" class="joy-circ" style="border-color:var(--neon)">GAS</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // CONFIG - Same as your Gawynt Hub
        const firebaseConfig = {
            apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
            databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
            projectId: "gawynt-hub",
        };

        const fb = initializeApp(firebaseConfig);
        const db = getDatabase(fb);

        const CAR_RIGS = [
            { name: 'X-1', top: 400, acc: 0.3 },
            { name: 'S-7', top: 320, acc: 0.2 },
            { name: 'G-0', top: 280, acc: 0.4 }
        ];
        const COLORS = ['#0051ff', '#ff007f', '#00f2ff', '#4dff00', '#ffcc00'];

        let gameState = {
            active: false, role: null, room: null,
            car: CAR_RIGS[0], color: COLORS[0],
            p: { x: 0, z: 0, speed: 0, boost: 100 },
            rival: { x: 0, z: 0, active: false, color: '#fff' }
        };

        // --- FIXED UI BINDINGS ---
        function initLobby() {
            const carCont = document.getElementById('car-selector');
            CAR_RIGS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `card ${i===0?'selected':''}`;
                d.innerHTML = `<strong>${c.name}</strong>`;
                d.onclick = () => {
                    document.querySelectorAll('.card').forEach(e=>e.classList.remove('selected'));
                    d.classList.add('selected'); gameState.car = c;
                };
                carCont.appendChild(d);
            });

            const colCont = document.getElementById('color-selector');
            COLORS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `dot ${i===0?'active':''}`;
                d.style.backgroundColor = c;
                d.style.color = c; // for the shadow
                d.onclick = () => {
                    document.querySelectorAll('.dot').forEach(e=>e.classList.remove('active'));
                    d.classList.add('active'); 
                    gameState.color = c;
                };
                colCont.appendChild(d);
            });
        }
        initLobby();

        // --- UPLINK LOGIC ---
        document.getElementById('host-btn').onclick = async () => {
            const code = Math.random().toString(36).substring(7).toUpperCase();
            gameState.room = code;
            gameState.role = 'host';
            document.getElementById('status').innerText = "SECTOR: " + code;
            await set(ref(db, `v6/${code}`), {
                status: 'wait',
                host: { color: gameState.color, x: 0, z: 0 }
            });
            listen(code);
        };

        document.getElementById('join-btn').onclick = async () => {
            const code = document.getElementById('sector-code').value.toUpperCase();
            if(!code) return;
            gameState.room = code;
            gameState.role = 'guest';
            await update(ref(db, `v6/${code}`), {
                status: 'play',
                guest: { color: gameState.color, x: 0, z: 0 }
            });
            listen(code);
        };

        function listen(code) {
            onValue(ref(db, `v6/${code}`), (snap) => {
                const val = snap.val();
                if(!val) return;
                if(val.status === 'play' && !gameState.active) startGame();
                
                const rivalData = (gameState.role === 'host') ? val.guest : val.host;
                if(rivalData) {
                    gameState.rival.x = rivalData.x;
                    gameState.rival.z = rivalData.z;
                    gameState.rival.color = rivalData.color;
                    gameState.rival.active = true;
                }
            });
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const keys = { up: false, left: false, right: false, boost: false };

        function startGame() {
            gameState.active = true;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            if(window.innerWidth < 800) document.getElementById('mobile-controls').style.display = 'flex';
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            setInterval(() => {
                if(!gameState.active) return;
                update(ref(db, `v6/${gameState.room}/${gameState.role}`), {
                    x: gameState.p.x, z: gameState.p.z
                });
            }, 50);

            loop();
        }

        function loop() {
            updatePhysics();
            render();
            requestAnimationFrame(loop);
        }

        function updatePhysics() {
            const p = gameState.p;
            if(keys.up) {
                let max = gameState.car.top;
                if(keys.boost && p.boost > 0) { max *= 1.4; p.boost -= 1; }
                else { p.boost = Math.min(100, p.boost + 0.2); }
                if(p.speed < max) p.speed += gameState.car.acc * 5;
            } else {
                p.speed *= 0.98;
            }

            p.z += p.speed;
            if(keys.left) p.x -= 0.05;
            if(keys.right) p.x += 0.05;
            p.x = Math.max(-1, Math.min(1, p.x));

            document.getElementById('ui-speed').innerText = Math.floor(p.speed);
            document.getElementById('ui-boost').innerText = Math.floor(p.boost);
        }

        function render() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Simplified 3D Road
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.moveTo(canvas.width*0.4, 0); ctx.lineTo(canvas.width*0.6, 0);
            ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height);
            ctx.fill();

            // Draw Rival
            if(gameState.rival.active) {
                let screenX = (canvas.width/2) + (gameState.rival.x * 200);
                ctx.fillStyle = gameState.rival.color;
                ctx.fillRect(screenX - 20, canvas.height/2, 40, 30);
            }
        }

        // --- CONTROLS ---
        window.onkeydown = e => {
            if(e.key === 'ArrowUp') keys.up = true;
            if(e.key === 'ArrowLeft') keys.left = true;
            if(e.key === 'ArrowRight') keys.right = true;
            if(e.key === 'Shift') keys.boost = true;
        };
        window.onkeyup = e => {
            if(e.key === 'ArrowUp') keys.up = false;
            if(e.key === 'ArrowLeft') keys.left = false;
            if(e.key === 'ArrowRight') keys.right = false;
            if(e.key === 'Shift') keys.boost = false;
        };

        const tBind = (id, k) => {
            document.getElementById(id).ontouchstart = () => keys[k] = true;
            document.getElementById(id).ontouchend = () => keys[k] = false;
        };
        tBind('joy-L', 'left'); tBind('joy-R', 'right'); tBind('btn-gas', 'up'); tBind('btn-boost', 'boost');
    </script>
</body>
</html>
