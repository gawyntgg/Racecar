<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAWYNT APEX — ULTRA MULTIPLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #0051ff;
            --neon: #00f2ff;
            --accent: #ff007f;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: #2c3e50;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* --- LOBBY SYSTEM --- */
        #lobby {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(135deg, #ffffff 0%, #a8ccff 100%);
            display: flex; align-items: center; justify-content: center;
            overflow-y: auto; padding: 20px;
        }

        .container {
            width: 100%; max-width: 700px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 40px; border-radius: 40px;
            border: 2px solid white;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo-main {
            font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900; color: var(--primary); letter-spacing: -4px;
            margin-bottom: 5px;
        }

        .section-label {
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 700;
            color: #777; text-transform: uppercase; margin: 30px 0 15px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; flex: 1; height: 1px; background: #ddd; }

        /* SELECTION */
        .selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card {
            background: white; border: 2px solid #eee; border-radius: 20px;
            padding: 20px 10px; cursor: pointer; transition: 0.3s;
        }
        .card.selected {
            border-color: var(--primary); background: #f0f5ff;
            transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 81, 255, 0.2);
        }

        .color-row { display: flex; justify-content: center; gap: 15px; }
        .dot {
            width: 50px; height: 50px; border-radius: 50%;
            border: 4px solid white; cursor: pointer; box-shadow: 0 0 0 2px #eee;
        }
        .dot.active { box-shadow: 0 0 0 3px var(--primary); transform: scale(1.1); }

        /* NETWORK */
        .network-card { background: #fff; padding: 30px; border-radius: 30px; margin-top: 30px; border: 1px solid #eee; }
        input {
            width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #eee;
            font-family: 'Orbitron'; text-align: center; font-size: 1.2rem; margin-bottom: 15px;
        }

        .btn {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-host { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-join { background: #2c3e50; color: white; }

        /* --- GAME UI --- */
        #game-ui { display: none; }
        #canvas { position: fixed; inset: 0; background: #8ec5fc; }

        #hud {
            position: fixed; top: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; z-index: 500;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px; border-radius: 20px;
            border-bottom: 5px solid var(--primary);
            text-align: center; min-width: 140px;
        }
        .stat-val { font-family: 'Orbitron'; font-size: 2rem; font-weight: 900; }

        /* CONTROLS */
        #mobile-controls {
            position: fixed; bottom: 50px; width: 100%;
            display: none; justify-content: space-between; padding: 0 50px; z-index: 500;
        }
        .joy-btn {
            width: 100px; height: 100px; background: rgba(255,255,255,0.9);
            border-radius: 50%; border: 3px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-weight: 900;
        }
        #btn-gas { width: 130px; height: 130px; border-color: var(--primary); color: var(--primary); font-size: 1.2rem; }

        #msg-box {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            z-index: 1100; font-family: 'Orbitron'; font-size: 10rem; color: var(--primary);
            text-shadow: 0 10px 50px rgba(0,0,0,0.2); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="container">
            <h1 class="logo-main">GAWYNT</h1>
            <p style="font-family:Orbitron; letter-spacing: 8px; color: #888; font-size: 0.8rem;">APEX PREDATOR V4</p>

            <div class="section-label">1. Choose Your Machine</div>
            <div class="selection-grid" id="car-selector"></div>

            <div class="section-label">2. Identity</div>
            <div class="color-row" id="color-selector"></div>

            <div class="section-label">3. Network Access</div>
            <div class="network-card">
                <button class="btn btn-host" id="host-btn">Create New Sector</button>
                <input type="text" id="sector-code" placeholder="SECTOR CODE">
                <button class="btn btn-join" id="join-btn">Join Sector</button>
                <div id="status" style="margin-top:20px; font-family:Orbitron; font-weight:900; color:var(--primary);">READY FOR UPLINK...</div>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div id="hud">
            <div class="stat-box"><small>KM/H</small><div id="ui-speed" class="stat-val">0</div></div>
            <div class="stat-box"><small>LAP</small><div id="ui-lap" class="stat-val">1/3</div></div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="msg-box">3</div>
        <div id="mobile-controls">
            <div id="key-L" class="joy-btn">L</div>
            <div id="key-GAS" class="joy-btn">GAS</div>
            <div id="key-R" class="joy-btn">R</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
            databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
            projectId: "gawynt-hub",
        };

        const fb = initializeApp(firebaseConfig);
        const db = getDatabase(fb);

        /* -----------------------------------------------------------
           ENGINE CONFIGURATION & PHYSICS CONSTANTS
        ----------------------------------------------------------- */
        const CARS = [
            { name: 'X-BOLT', top: 380, acc: 0.25, turn: 5.5, friction: 0.98 },
            { name: 'G-TECH', top: 310, acc: 0.18, turn: 6.2, friction: 0.99 },
            { name: 'ZENITH', top: 260, acc: 0.35, turn: 7.0, friction: 0.97 }
        ];
        const COLORS = ['#0051ff', '#ff007f', '#00f2ff', '#33ff00', '#ffaa00'];

        let state = {
            active: false,
            role: null,
            room: null,
            car: CARS[0],
            color: COLORS[0],
            player: { x: 0, z: 0, speed: 0, lap: 1 },
            rival: { x: 0, z: 0, speed: 0, active: false, color: '#fff' },
            particles: []
        };

        const view = {
            canvas: document.getElementById('canvas'),
            ctx: document.getElementById('canvas').getContext('2d'),
            w: 1024, h: 768,
            roadW: 2000, segL: 200,
            camH: 1000, camD: null,
            drawDist: 350,
            track: []
        };

        const inputs = { up: false, left: false, right: false };

        /* -----------------------------------------------------------
           UI BUILDER
        ----------------------------------------------------------- */
        function initLobby() {
            const carGrid = document.getElementById('car-selector');
            CARS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `card ${i===0?'selected':''}`;
                d.innerHTML = `<strong>${c.name}</strong><br><small>${c.top} KM/H</small>`;
                d.onclick = () => {
                    document.querySelectorAll('.card').forEach(el=>el.classList.remove('selected'));
                    d.classList.add('selected'); state.car = c;
                };
                carGrid.appendChild(d);
            });

            const colRow = document.getElementById('color-selector');
            COLORS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `dot ${i===0?'active':''}`;
                d.style.background = c;
                d.onclick = () => {
                    document.querySelectorAll('.dot').forEach(el=>el.classList.remove('active'));
                    d.classList.add('active'); state.color = c;
                };
                colRow.appendChild(d);
            });
        }
        initLobby();

        /* -----------------------------------------------------------
           NETWORK LOGIC (JOIN/HOST FIXED)
        ----------------------------------------------------------- */
        document.getElementById('host-btn').onclick = async () => {
            state.room = Math.random().toString(36).substring(7).toUpperCase();
            state.role = 'host';
            document.getElementById('status').innerText = "SECTOR: " + state.room;
            await set(ref(db, `apex_v4/${state.room}`), {
                state: 'wait',
                host: { x: 0, z: 0, speed: 0, color: state.color }
            });
            syncLoop();
        };

        document.getElementById('join-btn').onclick = async () => {
            const code = document.getElementById('sector-code').value.toUpperCase();
            if(!code) return;
            state.room = code;
            state.role = 'guest';
            document.getElementById('status').innerText = "LINKING TO " + code;
            await update(ref(db, `apex_v4/${state.room}`), {
                state: 'start',
                guest: { x: 0, z: 0, speed: 0, color: state.color }
            });
            syncLoop();
        };

        function syncLoop() {
            onValue(ref(db, `apex_v4/${state.room}`), (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.state === 'start' && !state.active) startRace();
                
                const rivalData = (state.role === 'host') ? data.guest : data.host;
                if(rivalData) {
                    state.rival.x = rivalData.x;
                    state.rival.z = rivalData.z;
                    state.rival.speed = rivalData.speed;
                    state.rival.color = rivalData.color;
                    state.rival.active = true;
                }
            });
        }

        /* -----------------------------------------------------------
           TRACK GENERATOR
        ----------------------------------------------------------- */
        function buildTrack() {
            view.track = [];
            const addSeg = (curve) => {
                const i = view.track.length;
                view.track.push({
                    index: i,
                    p1: { world: { z: i * view.segL }, screen: {} },
                    p2: { world: { z: (i+1) * view.segL }, screen: {} },
                    curve: curve,
                    sprites: (i % 20 === 0) ? [{x: 1.5, type: 'tree'}] : [],
                    color: Math.floor(i/3)%2 ? 
                        { road: '#333', grass: '#2e7d32', rum: '#fff' } : 
                        { road: '#222', grass: '#276b2b', rum: '#ff0000' }
                });
            };

            for(let i=0; i<100; i++) addSeg(0);
            for(let i=0; i<100; i++) addSeg(2);
            for(let i=0; i<150; i++) addSeg(-3);
            for(let i=0; i<100; i++) addSeg(0);
            for(let i=0; i<100; i++) addSeg(5);
            for(let i=0; i<100; i++) addSeg(0);
            view.trackLen = view.track.length * view.segL;
        }

        /* -----------------------------------------------------------
           PARTICLE ENGINE
        ----------------------------------------------------------- */
        function spawnSmoke(x, z) {
            if(state.player.speed < 2000) return;
            state.particles.push({
                x: x + (Math.random()-0.5),
                z: z,
                y: 10 + Math.random()*20,
                life: 1.0,
                size: 5 + Math.random()*15
            });
        }

        /* -----------------------------------------------------------
           3D RENDERING CORE
        ----------------------------------------------------------- */
        function project(p, camX, camY, camZ, w, h) {
            p.camera = {
                x: (p.world.x || 0) - camX,
                y: (p.world.y || 0) - camY,
                z: (p.world.z || 0) - camZ
            };
            let scale = view.camD / p.camera.z;
            p.screen.x = Math.round((w/2) + (scale * p.camera.x * w/2));
            p.screen.y = Math.round((h/2) - (scale * p.camera.y * h/2));
            p.screen.w = Math.round(scale * view.roadW * w/2);
        }

        async function startRace() {
            state.active = true;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            buildTrack();
            resize();
            window.addEventListener('resize', resize);

            const msg = document.getElementById('msg-box');
            msg.style.display = 'flex';
            for(let i=3; i>0; i--) { msg.innerText = i; await new Promise(r=>setTimeout(r,1000)); }
            msg.innerText = "GO!"; setTimeout(()=>msg.style.display='none', 800);

            // High Frequency Sync
            setInterval(() => {
                if(!state.active) return;
                update(ref(db, `apex_v4/${state.room}/${state.role}`), {
                    x: state.player.x, z: state.player.z, speed: state.player.speed
                });
            }, 40);

            loop();
        }

        function resize() {
            view.canvas.width = window.innerWidth;
            view.canvas.height = window.innerHeight;
            view.camD = 1 / Math.tan((100/2) * Math.PI / 180);
            if(window.innerWidth < 800) document.getElementById('mobile-controls').style.display = 'flex';
        }

        function loop() {
            if(!state.active) return;
            updatePhysics();
            render();
            requestAnimationFrame(loop);
        }

        function updatePhysics() {
            const p = state.player;
            const car = state.car;
            const dt = 1/60;

            // Acceleration (Buffed)
            if(inputs.up) p.speed = Math.min(p.speed + (car.acc * 5000 * dt), car.top * 60);
            else p.speed *= car.friction;

            const speedPct = p.speed / (car.top * 60);
            
            // Steering
            if(inputs.left) p.x -= dt * speedPct * car.turn;
            if(inputs.right) p.x += dt * speedPct * car.turn;

            // Centrifugal Force
            let seg = view.track[Math.floor(p.z / view.segL) % view.track.length];
            p.x -= dt * speedPct * seg.curve * 2;

            p.z += p.speed * dt;
            if(p.z >= view.trackLen) { p.z -= view.trackLen; p.lap++; }

            p.x = Math.max(-2.5, Math.min(2.5, p.x));
            document.getElementById('ui-speed').innerText = Math.floor(p.speed / 50);
            document.getElementById('ui-lap').innerText = `${p.lap}/3`;
            
            if(speedPct > 0.5 && Math.abs(p.x) > 1) spawnSmoke(p.x, p.z);
        }

        function render() {
            const ctx = view.ctx;
            const w = view.canvas.width;
            const h = view.canvas.height;
            ctx.clearRect(0,0,w,h);

            // Sky/Ground
            ctx.fillStyle = '#8ec5fc'; ctx.fillRect(0,0,w,h/2);
            ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,h/2,w,h/2);

            let startI = Math.floor(state.player.z / view.segL);
            let xOffset = 0, dx = 0;

            // Render Road Segments
            for(let n=0; n<view.drawDist; n++) {
                let s = view.track[(startI + n) % view.track.length];
                let looped = s.index < startI;

                project(s.p1, (state.player.x * view.roadW) - xOffset, view.camH, state.player.z - (looped ? view.trackLen : 0), w, h);
                project(s.p2, (state.player.x * view.roadW) - xOffset - dx, view.camH, state.player.z - (looped ? view.trackLen : 0), w, h);

                xOffset += dx;
                dx += s.curve;

                if(s.p1.camera.z <= view.camD) continue;

                // Draw Slices
                const p1 = s.p1.screen, p2 = s.p2.screen;
                ctx.fillStyle = s.color.grass; ctx.fillRect(0, p2.y, w, p1.y-p2.y);
                ctx.fillStyle = s.color.rum;
                ctx.beginPath(); ctx.moveTo(p1.x - p1.w*1.1, p1.y); ctx.lineTo(p1.x + p1.w*1.1, p1.y);
                ctx.lineTo(p2.x + p2.w*1.1, p2.y); ctx.lineTo(p2.x - p2.w*1.1, p2.y); ctx.fill();
                ctx.fillStyle = s.color.road;
                ctx.beginPath(); ctx.moveTo(p1.x - p1.w, p1.y); ctx.lineTo(p1.x + p1.w, p1.y);
                ctx.lineTo(p2.x + p2.w, p2.y); ctx.lineTo(p2.x - p2.w, p2.y); ctx.fill();
            }

            // Render Rival (Fixed Handshake)
            if(state.rival.active) {
                let rZ = state.rival.z - state.player.z;
                // Wrap-around logic for multiplayer
                if(rZ < -view.trackLen/2) rZ += view.trackLen;
                if(rZ > view.trackLen/2) rZ -= view.trackLen;

                if(rZ > 0 && rZ < view.drawDist * view.segL) {
                    let scale = view.camD / (rZ / view.roadW);
                    let rx = (w/2) + (scale * (state.rival.x - state.player.x) * view.roadW * w/2000);
                    let ry = (h/2) + (view.camH * scale);
                    ctx.fillStyle = state.rival.color;
                    ctx.fillRect(rx - 50*scale, ry - 80*scale, 100*scale, 50*scale);
                    // Rival Label
                    ctx.fillStyle = "white"; ctx.font = "bold 12px Orbitron";
                    ctx.fillText("RIVAL", rx - 20, ry - 90*scale);
                }
            }

            drawCockpit(ctx, w, h);
        }

        function drawCockpit(ctx, w, h) {
            ctx.fillStyle = '#0a0a0a';
            ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(0, h*0.82);
            ctx.quadraticCurveTo(w/2, h*0.74, w, h*0.82); ctx.lineTo(w, h); ctx.fill();
            ctx.strokeStyle = state.color; ctx.lineWidth = 5; ctx.stroke();

            ctx.save(); ctx.translate(w/2, h+60);
            let steer = 0; if(inputs.left) steer = -0.4; if(inputs.right) steer = 0.4;
            ctx.rotate(steer);
            ctx.lineWidth = 50; ctx.strokeStyle = '#050505';
            ctx.beginPath(); ctx.arc(0, -220, 240, Math.PI+0.4, -0.4); ctx.stroke();
            ctx.restore();
        }

        /* -----------------------------------------------------------
           CONTROLS BINDING
        ----------------------------------------------------------- */
        window.onkeydown = e => {
            if(e.code==='ArrowUp'||e.code==='KeyW') inputs.up = true;
            if(e.code==='ArrowLeft'||e.code==='KeyA') inputs.left = true;
            if(e.code==='ArrowRight'||e.code==='KeyD') inputs.right = true;
        };
        window.onkeyup = e => {
            if(e.code==='ArrowUp'||e.code==='KeyW') inputs.up = false;
            if(e.code==='ArrowLeft'||e.code==='KeyA') inputs.left = false;
            if(e.code==='ArrowRight'||e.code==='KeyD') inputs.right = false;
        };
        const touch = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); inputs[k] = true; };
            el.ontouchend = (e) => { e.preventDefault(); inputs[k] = false; };
        };
        touch('key-L','left'); touch('key-R','right'); touch('key-GAS','up');
    </script>
</body>
</html>
