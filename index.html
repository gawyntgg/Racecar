<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAWYNT APEX — V6.2 REALISM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #0051ff;
            --neon: #00f2ff;
            --boost: #ff3300;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            width: 100vw; height: 100vh;
            touch-action: none;
        }

        /* --- STABLE LOBBY --- */
        #lobby {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 90%; max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo { font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; color: var(--neon); margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card {
            background: rgba(255,255,255,0.1); padding: 15px 5px; border-radius: 12px;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .card.selected { border-color: var(--neon); background: rgba(0, 242, 255, 0.1); }

        .dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .dot {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2); cursor: pointer;
        }
        .dot.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 15px currentColor; }

        input {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: rgba(0,0,0,0.5); color: white; font-family: 'Orbitron';
            text-align: center; margin-bottom: 10px;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-bottom: 10px;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-white { background: white; color: black; }

        /* --- GAME ENGINE UI --- */
        #game-ui { display: none; }
        #canvas { position: fixed; inset: 0; background: #000; }
        
        #hud {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-around; z-index: 500;
        }
        .stat { background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; border-bottom: 2px solid var(--neon); }

        #mobile-controls {
            position: fixed; bottom: 30px; width: 100%;
            display: none; justify-content: space-between; padding: 0 20px; z-index: 500;
        }
        .btn-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid white;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="container">
            <h1 class="logo">GAWYNT</h1>
            
            <div class="grid" id="car-list"></div>
            <div class="dots" id="color-list"></div>

            <button class="btn btn-blue" id="host-btn">HOST NEW SECTOR</button>
            <input type="text" id="sector-in" placeholder="SYNC CODE">
            <button class="btn btn-white" id="join-btn">JOIN SECTOR</button>
            <p id="status" style="color:var(--neon); font-family:'Orbitron'; font-size:0.8rem;"></p>
        </div>
    </div>

    <div id="game-ui">
        <div id="hud">
            <div class="stat">SPEED <span id="val-speed">0</span></div>
            <div class="stat" style="border-color:var(--boost)">NOS <span id="val-boost">100</span></div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="mobile-controls">
            <div style="display:flex; gap:10px;">
                <div id="m-left" class="btn-circle">L</div>
                <div id="m-right" class="btn-circle">R</div>
            </div>
            <div style="display:flex; gap:10px;">
                <div id="m-boost" class="btn-circle" style="border-color:var(--boost)">NOS</div>
                <div id="m-gas" class="btn-circle" style="border-color:var(--neon)">GAS</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
            databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
            projectId: "gawynt-hub",
        };
        const db = getDatabase(initializeApp(config));

        const CARS = [{n:'HYPER', s:450, a:0.3}, {n:'STRAT', s:350, a:0.2}, {n:'PHANT', s:300, a:0.4}];
        const COLS = ['#0051ff', '#ff007f', '#00f2ff', '#4dff00', '#ffcc00'];
        
        let state = {
            active: false, role: null, room: null,
            car: CARS[0], color: COLS[0],
            p: { x: 0, z: 0, speed: 0, boost: 100 },
            rival: { x: 0, z: 0, color: '#fff', active: false },
            track: [], roadW: 2000, segL: 200, camH: 1000, drawD: 200
        };

        const keys = { up: false, left: false, right: false, boost: false };

        // --- UI SETUP ---
        function setupUI() {
            const cl = document.getElementById('car-list');
            CARS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `card ${i===0?'selected':''}`;
                d.innerHTML = `<b>${c.n}</b>`;
                d.onclick = () => {
                    document.querySelectorAll('.card').forEach(e=>e.classList.remove('selected'));
                    d.classList.add('selected'); state.car = c;
                };
                cl.appendChild(d);
            });

            const col = document.getElementById('color-list');
            COLS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `dot ${i===0?'active':''}`;
                d.style.backgroundColor = c;
                d.style.color = c;
                d.onclick = () => {
                    document.querySelectorAll('.dot').forEach(e=>e.classList.remove('active'));
                    d.classList.add('active'); state.color = c;
                };
                col.appendChild(d);
            });
        }
        setupUI();

        // --- UPLINK ---
        document.getElementById('host-btn').onclick = async () => {
            state.room = Math.random().toString(36).substring(7).toUpperCase();
            state.role = 'host';
            document.getElementById('status').innerText = "SECTOR CODE: " + state.room;
            await set(ref(db, `v62/${state.room}`), { status: 'wait', host: { x:0, z:0, c:state.color } });
            listen();
        };

        document.getElementById('join-btn').onclick = async () => {
            const code = document.getElementById('sector-in').value.toUpperCase();
            if(!code) return;
            state.room = code; state.role = 'guest';
            await update(ref(db, `v62/${code}`), { status: 'play', guest: { x:0, z:0, c:state.color } });
            listen();
        };

        function listen() {
            onValue(ref(db, `v62/${state.room}`), (snap) => {
                const val = snap.val();
                if(!val) return;
                if(val.status === 'play' && !state.active) start();
                const riv = (state.role === 'host') ? val.guest : val.host;
                if(riv) { state.rival.x = riv.x; state.rival.z = riv.z; state.rival.color = riv.c; state.rival.active = true; }
            });
        }

        // --- REALISTIC ENGINE ---
        function buildTrack() {
            for(let i=0; i<1000; i++) {
                state.track.push({
                    z: i * state.segL,
                    curve: i > 200 && i < 400 ? 2 : (i > 600 && i < 800 ? -3 : 0),
                    col: Math.floor(i/3)%2 ? {r:'#333', g:'#050505', b:'#fff'} : {r:'#222', g:'#000', b:'#f00'}
                });
            }
        }

        function project(p, camX, camY, camZ, fov, w, h) {
            const scale = fov / (p.z - camZ);
            p.sx = (w/2) + (scale * (p.x - camX) * w/2);
            p.sy = (h/2) - (scale * (p.y - camY) * h/2);
            p.sw = scale * state.roadW * w/2;
        }

        function start() {
            state.active = true;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            if(window.innerWidth < 800) document.getElementById('mobile-controls').style.display = 'flex';
            
            const cvs = document.getElementById('canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;

            buildTrack();

            // Uplink Loop
            setInterval(() => {
                update(ref(db, `v62/${state.room}/${state.role}`), { x: state.p.x, z: state.p.z });
            }, 50);

            function loop() {
                updatePhys();
                draw(ctx, cvs.width, cvs.height);
                requestAnimationFrame(loop);
            }
            loop();
        }

        function updatePhys() {
            const p = state.p;
            if(keys.up) {
                let max = state.car.s * 50;
                if(keys.boost && p.boost > 0) { max *= 1.5; p.boost -= 0.5; }
                else p.boost = Math.min(100, p.boost + 0.1);
                if(p.speed < max) p.speed += state.car.a * 200;
            } else p.speed *= 0.98;

            p.z += p.speed * 0.016;
            if(keys.left) p.x -= 0.05;
            if(keys.right) p.x += 0.05;
            p.x = Math.max(-2, Math.min(2, p.x));

            document.getElementById('val-speed').innerText = Math.floor(p.speed/100);
            document.getElementById('val-boost').innerText = Math.floor(p.boost);
        }

        function draw(ctx, w, h) {
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,w,h);
            
            const startI = Math.floor(state.p.z / state.segL);
            const fov = 1 / Math.tan(80 * Math.PI / 360);
            let xOff = 0, dx = 0;

            for(let n=0; n<state.drawD; n++) {
                const s = state.track[(startI + n) % state.track.length];
                const p1 = { x: -xOff, y: 0, z: s.z };
                const p2 = { x: -(xOff + dx), y: 0, z: s.z + state.segL };
                
                // Looped track logic
                const zOffset = (s.z < state.p.z) ? state.track.length * state.segL : 0;
                project(p1, state.p.x * state.roadW, state.camH, state.p.z - zOffset, fov, w, h);
                project(p2, state.p.x * state.roadW, state.camH, state.p.z - zOffset, fov, w, h);

                xOff += dx; dx += s.curve;

                if(p1.sy <= p2.sy) continue;

                // Grass
                ctx.fillStyle = s.col.g; ctx.fillRect(0, p2.sy, w, p1.sy - p2.sy);
                // Rum Strips
                ctx.fillStyle = s.col.b;
                ctx.beginPath(); ctx.moveTo(p1.sx - p1.sw*1.1, p1.sy); ctx.lineTo(p1.sx + p1.sw*1.1, p1.sy);
                ctx.lineTo(p2.sx + p2.sw*1.1, p2.sy); ctx.lineTo(p2.sx - p2.sw*1.1, p2.sy); ctx.fill();
                // Road
                ctx.fillStyle = s.col.r;
                ctx.beginPath(); ctx.moveTo(p1.sx - p1.sw, p1.sy); ctx.lineTo(p1.sx + p1.sw, p1.sy);
                ctx.lineTo(p2.sx + p2.sw, p2.sy); ctx.lineTo(p2.sx - p2.sw, p2.sy); ctx.fill();

                // Draw Rival if in this segment
                if(state.rival.active && Math.floor(state.rival.z/state.segL) === (startI + n)%state.track.length) {
                    const rx = p1.sx + (state.rival.x * p1.sw);
                    ctx.fillStyle = state.rival.color;
                    ctx.fillRect(rx-20, p1.sy-30, 40, 30);
                }
            }

            // Dashboard
            ctx.fillStyle = '#050505';
            ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(0,h*0.85); 
            ctx.quadraticCurveTo(w/2, h*0.75, w, h*0.85); ctx.lineTo(w,h); ctx.fill();
        }

        // --- BINDINGS ---
        window.onkeydown = e => {
            if(e.key==='ArrowUp'||e.key==='w') keys.up=true;
            if(e.key==='ArrowLeft'||e.key==='a') keys.left=true;
            if(e.key==='ArrowRight'||e.key==='d') keys.right=true;
            if(e.key==='Shift') keys.boost=true;
        };
        window.onkeyup = e => {
            if(e.key==='ArrowUp'||e.key==='w') keys.up=false;
            if(e.key==='ArrowLeft'||e.key==='a') keys.left=false;
            if(e.key==='ArrowRight'||e.key==='d') keys.right=false;
            if(e.key==='Shift') keys.boost=false;
        };
        const m = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = e => { e.preventDefault(); keys[k]=true; };
            el.ontouchend = e => { e.preventDefault(); keys[k]=false; };
        };
        m('m-left','left'); m('m-right','right'); m('m-gas','up'); m('m-boost','boost');
    </script>
</body>
</html>
