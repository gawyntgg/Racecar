<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GAWYNT RACING — 3D PERSPECTIVE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

:root {
    --primary-accent: #0051ff;
    --asphalt: #555e63;
    --grass: #81c784;
    --sky: #8ec5fc;
    --text-dark: #2c3e50;
    --bg-light: #f4f7f6;
    --barrier-red: #d32f2f;
    --barrier-white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Rajdhani', sans-serif; 
    background: var(--bg-light); 
    color: var(--text-dark); 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    touch-action: none; 
}

/* --- LOBBY UI --- */
#lobby {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #ffffff 0%, #8ec5fc 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; overflow-y: auto; padding: 40px 0;
}

.logo-container { text-align: center; margin-bottom: 40px; }
.logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 8vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    background: linear-gradient(90deg, var(--primary-accent), #ff007f, var(--primary-accent));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: flow 4s linear infinite;
}
@keyframes flow { 0% { background-position: 0%; } 100% { background-position: 200%; } }

.setup-box {
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    border-radius: 20px; padding: 30px;
    width: 90%; max-width: 600px;
}

.section-title {
    font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 0.3em;
    color: var(--primary-accent); text-transform: uppercase; margin-bottom: 15px; font-weight: 700;
}

.grid { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
.card {
    width: 130px; padding: 15px; background: #ffffff;
    border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer;
    text-align: center;
}
.card.selected { border-color: var(--primary-accent); background: #edf2ff; }

.color-dot { width: 35px; height: 35px; border-radius: 50%; border: 3px solid #ccc; cursor: pointer; }
.color-dot.active { border-color: var(--text-dark); transform: scale(1.2); }

.lap-ctrl { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; justify-content: center; }
.lap-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-accent); background: #fff; cursor: pointer; }
.lap-display { font-family: 'Orbitron'; font-size: 2rem; min-width: 50px; text-align: center; }

.btn-main {
    font-family: 'Orbitron'; font-weight: 900; padding: 15px; border: none; border-radius: 10px;
    background: var(--primary-accent); color: #fff; cursor: pointer; width: 100%; margin-bottom: 10px;
}

#gameCanvas { display: none; position: fixed; inset: 0; background: var(--sky); }
#hud {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    display: none; background: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 10px 40px; z-index: 10;
    gap: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.hud-item { text-align: center; font-family: 'Orbitron'; }
.hud-label { font-size: 0.6rem; color: var(--primary-accent); display: block; }
.hud-val { font-size: 1.8rem; font-weight: 900; }

#count {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    z-index: 50; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(4px);
}
#count-val { font-family: 'Orbitron'; font-size: 10vw; font-weight: 900; }

#mobile-ui { position: fixed; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; z-index: 20; }
.m-joy { width: 80px; height: 80px; background: rgba(255,255,255,0.8); border: 2px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
</style>
</head>
<body>

<div id="lobby">
    <div class="logo-container">
        <div class="logo">GAWYNT</div>
        <div style="letter-spacing: 0.8em; font-size: 0.7rem; color: var(--primary-accent); font-weight: 700;">3D COCKPIT SIM</div>
    </div>

    <div class="setup-box">
        <div class="section-title">Select Prototype</div>
        <div class="grid" id="carGrid"></div>
        <div class="section-title">Core Identity</div>
        <div class="grid" id="colorGrid"></div>
        <div class="section-title">Laps</div>
        <div class="lap-ctrl">
            <button class="lap-btn" onclick="adjustLaps(-1)">-</button>
            <div class="lap-display" id="lapView">3</div>
            <button class="lap-btn" onclick="adjustLaps(1)">+</button>
        </div>
        <button class="btn-main" onclick="initHost()">CREATE SECTOR</button>
        <button class="btn-main" style="background: #2c3e50;" onclick="initJoin()">JOIN SECTOR</button>
        <input type="text" id="joinInput" placeholder="ENTER CODE" style="width:100%; padding:10px; text-align:center; margin-top:10px; font-family:Orbitron;">
        <div id="sectorOutput" style="margin-top:20px; font-family: 'Orbitron'; color: var(--primary-accent); text-align: center; font-weight: bold;"></div>
    </div>
</div>

<div id="count"><div id="count-val">READY</div></div>
<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div class="hud-item"><span class="hud-label">LAP</span><span id="hLap" class="hud-val">1/3</span></div>
    <div class="hud-item"><span class="hud-label">KM/H</span><span id="hSpeed" class="hud-val">0</span></div>
</div>

<div id="mobile-ui">
    <div id="ctrl-L" class="m-joy">L</div>
    <div id="ctrl-G" class="m-joy" style="color:var(--primary-accent)">GO</div>
    <div id="ctrl-R" class="m-joy">R</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
    authDomain: "gawynt-hub.firebaseapp.com",
    databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
    projectId: "gawynt-hub",
    storageBucket: "gawynt-hub.firebasestorage.app",
    messagingSenderId: "330651852035",
    appId: "1:330651852035:web:db931f867da21b6a519d36"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CAR_DATA = [
    { id: 'f1', name: 'BOLT-01', top: 25, acc: 0.5, turn: 0.07 },
    { id: 'gt', name: 'GAWYNT-GT', top: 21, acc: 0.4, turn: 0.05 },
    { id: 'ap', name: 'APEX-X', top: 19, acc: 0.45, turn: 0.09 }
];
const COLORS = ['#0051ff', '#ff5500', '#ff007f', '#00b359', '#6200ea'];

const trackPoints = [
    {x: 500, y: 500}, {x: 4000, y: 500}, {x: 4500, y: 1500}, 
    {x: 4500, y: 4000}, {x: 3500, y: 5000}, {x: 1000, y: 5000}, 
    {x: 300, y: 4000}, {x: 300, y: 1000}, {x: 500, y: 500}
];

let selCar = CAR_DATA[0], selColor = COLORS[0], lapCount = 3;
let role, roomID, isRacing = false, isFrozen = true;
let car = { x: 650, y: 500, angle: 0, speed: 0, lap: 1, trigger: false }; 
let opponent = null, keys = {};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function setupLobby() {
    const cg = document.getElementById('carGrid');
    CAR_DATA.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = `card ${i===0?'selected':''}`;
        div.innerHTML = `<div class="card-name">${c.name}</div>`;
        div.onclick = () => {
            document.querySelectorAll('.card').forEach(e => e.classList.remove('selected'));
            div.classList.add('selected'); selCar = c;
        };
        cg.appendChild(div);
    });

    const colG = document.getElementById('colorGrid');
    COLORS.forEach((c, i) => {
        const dot = document.createElement('div');
        dot.className = `color-dot ${i===0?'active':''}`;
        dot.style.background = c;
        dot.onclick = () => {
            document.querySelectorAll('.color-dot').forEach(e => e.classList.remove('active'));
            dot.classList.add('active'); selColor = c;
        };
        colG.appendChild(dot);
    });
}
setupLobby();

window.adjustLaps = (v) => { lapCount = Math.max(1, lapCount + v); document.getElementById('lapView').innerText = lapCount; };

window.initHost = async () => {
    roomID = Math.random().toString(36).substring(7).toUpperCase();
    role = 'host';
    document.getElementById('sectorOutput').innerText = "CODE: " + roomID;
    await set(ref(db, `race_v2/${roomID}`), {
        state: 'waiting', totalLaps: lapCount,
        host: { color: selColor, x: 650, y: 500, angle: 0, active: true, lap: 1 } 
    });
    startListener();
};

window.initJoin = async () => {
    roomID = document.getElementById('joinInput').value.toUpperCase();
    if (!roomID) return;
    role = 'guest';
    const snap = await get(ref(db, `race_v2/${roomID}`));
    if (snap.exists()) {
        lapCount = snap.val().totalLaps;
        await update(ref(db, `race_v2/${roomID}`), {
            guest: { color: selColor, x: 650, y: 460, angle: 0, active: true, lap: 1 }, 
            state: 'begin'
        });
        startListener();
    }
};

function startListener() {
    onValue(ref(db, `race_v2/${roomID}`), snap => {
        const data = snap.val();
        if (data.state === 'begin' && !isRacing) triggerCountdown();
        if (isRacing) opponent = (role === 'host') ? data.guest : data.host;
    });
}

async function triggerCountdown() {
    isRacing = true;
    document.getElementById('lobby').style.display = 'none';
    canvas.style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.getElementById('hud').style.display = 'flex';
    if(/Android|iPhone/i.test(navigator.userAgent)) document.getElementById('mobile-ui').style.display = 'flex';

    const cDiv = document.getElementById('count');
    const cVal = document.getElementById('count-val');
    cDiv.style.display = 'flex';
    for (let s of ['3', '2', '1', 'GO!']) {
        cVal.innerText = s;
        await new Promise(r => setTimeout(r, 800));
    }
    cDiv.style.display = 'none';
    isFrozen = false;
    render();
    setInterval(() => {
        update(ref(db, `race_v2/${roomID}/${role}`), { x: car.x, y: car.y, angle: car.angle, speed: car.speed, lap: car.lap });
    }, 50);
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

/* --- 3D RENDERING ENGINE --- */
function project(p, camX, camY, camAngle, width, height) {
    // Translate relative to camera
    let dx = p.x - camX;
    let dy = p.y - camY;

    // Rotate relative to camera heading
    let rx = dx * Math.cos(-camAngle) - dy * Math.sin(-camAngle);
    let ry = dx * Math.sin(-camAngle) + dy * Math.cos(-camAngle);

    // ry is distance in front of camera
    if (ry < 10) return null; 

    const focalLength = 600;
    const scale = focalLength / ry;
    
    return {
        x: width / 2 + rx * scale,
        y: height / 2 + 150 + (0) * scale, // 150 is vertical offset for cockpit height
        scale: scale
    };
}

function render() {
    if (!isRacing) return;
    requestAnimationFrame(render);

    if (!isFrozen) {
        if (keys['ArrowUp'] || keys['KeyW']) car.speed = Math.min(car.speed + selCar.acc, selCar.top);
        else car.speed *= 0.98;

        if (car.speed > 0.5) {
            const factor = Math.min(car.speed / 10, 1);
            if (keys['ArrowLeft'] || keys['KeyA']) car.angle -= selCar.turn * factor;
            if (keys['ArrowRight'] || keys['KeyD']) car.angle += selCar.turn * factor;
        }

        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;

        if (car.x > 700) car.trigger = true;
        if (car.x < 500 && car.trigger) {
            car.lap++; car.trigger = false;
            document.getElementById('hLap').innerText = `${car.lap}/${lapCount}`;
            if (car.lap > lapCount) { isFrozen = true; alert("WINNER!"); }
        }
    }

    // Sky and Ground
    ctx.fillStyle = '#8ec5fc';
    ctx.fillRect(0, 0, canvas.width, canvas.height/2 + 150);
    ctx.fillStyle = '#81c784';
    ctx.fillRect(0, canvas.height/2 + 150, canvas.width, canvas.height);

    // Project and draw track
    const roadWidth = 250;
    const barrierWidth = 280;

    // We draw track segments
    for (let i = 0; i < trackPoints.length - 1; i++) {
        const p1 = trackPoints[i];
        const p2 = trackPoints[i+1];
        
        // Simple subdivision for smoother curves in 3D
        const steps = 10;
        for(let s=0; s<steps; s++) {
            const tStart = s / steps;
            const tEnd = (s+1) / steps;
            
            const seg1 = { x: p1.x + (p2.x-p1.x)*tStart, y: p1.y + (p2.y-p1.y)*tStart };
            const seg2 = { x: p1.x + (p2.x-p1.x)*tEnd, y: p1.y + (p2.y-p1.y)*tEnd };

            const pr1 = project(seg1, car.x, car.y, car.angle + Math.PI/2, canvas.width, canvas.height);
            const pr2 = project(seg2, car.x, car.y, car.angle + Math.PI/2, canvas.width, canvas.height);

            if (pr1 && pr2) {
                // Draw Barrier/Rumble Strip
                ctx.fillStyle = (Math.floor(tStart * 50 + i * steps) % 2 === 0) ? '#d32f2f' : '#fff';
                ctx.beginPath();
                ctx.moveTo(pr1.x - barrierWidth * pr1.scale, pr1.y);
                ctx.lineTo(pr1.x + barrierWidth * pr1.scale, pr1.y);
                ctx.lineTo(pr2.x + barrierWidth * pr2.scale, pr2.y);
                ctx.lineTo(pr2.x - barrierWidth * pr2.scale, pr2.y);
                ctx.fill();

                // Draw Road
                ctx.fillStyle = '#555e63';
                ctx.beginPath();
                ctx.moveTo(pr1.x - roadWidth * pr1.scale, pr1.y);
                ctx.lineTo(pr1.x + roadWidth * pr1.scale, pr1.y);
                ctx.lineTo(pr2.x + roadWidth * pr2.scale, pr2.y);
                ctx.lineTo(pr2.x - roadWidth * pr2.scale, pr2.y);
                ctx.fill();
                
                // Draw Center line
                if (Math.floor(tStart * 100) % 10 < 5) {
                    ctx.strokeStyle = "rgba(255,255,255,0.5)";
                    ctx.lineWidth = 2 * pr1.scale;
                    ctx.beginPath();
                    ctx.moveTo(pr1.x, pr1.y);
                    ctx.lineTo(pr2.x, pr2.y);
                    ctx.stroke();
                }
            }
        }
    }

    // Draw Rival
    if (opponent && opponent.active) {
        const prOpp = project(opponent, car.x, car.y, car.angle + Math.PI/2, canvas.width, canvas.height);
        if (prOpp) {
            ctx.save();
            ctx.translate(prOpp.x, prOpp.y);
            ctx.scale(prOpp.scale * 2, prOpp.scale * 2);
            // Rival sprite logic
            ctx.fillStyle = opponent.color;
            ctx.fillRect(-15, -15, 30, 10);
            ctx.fillStyle = '#000';
            ctx.fillRect(-10, -18, 20, 5);
            ctx.restore();
        }
    }

    draw3DCockpit(ctx, canvas.width, canvas.height, selColor);
    document.getElementById('hSpeed').innerText = Math.round(car.speed * 12);
}

function draw3DCockpit(ctx, w, h, color) {
    ctx.save();
    
    // Windshield bottom tint
    const grad = ctx.createLinearGradient(0, h * 0.6, 0, h * 0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, h * 0.6, w, h * 0.15);

    // Dashboard
    ctx.fillStyle = '#1c2833';
    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(0, h * 0.75);
    ctx.bezierCurveTo(w*0.2, h*0.7, w*0.8, h*0.7, w, h*0.75);
    ctx.lineTo(w, h);
    ctx.fill();

    // Dash Accent
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.stroke();

    // Steering wheel logic
    let sA = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) sA = -0.5;
    if (keys['ArrowRight'] || keys['KeyD']) sA = 0.5;

    ctx.translate(w/2, h + 50);
    ctx.rotate(sA);
    
    // Wheel
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 40;
    ctx.beginPath();
    ctx.arc(0, -180, 250, 0, Math.PI*2);
    ctx.stroke();
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.restore();
}
</script>
</body>
</html>
